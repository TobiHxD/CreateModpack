name: Restart Server on Merge

on:
  push:
    branches:
      - main

concurrency:
  group: restart-server-${{ github.ref }}
  cancel-in-progress: true

jobs:
  wait-for-propagation:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v4

      - name: Wait for GitHub Pages to Propagate
        env:
          PAGES_URL: https://tobihxd.github.io/CreateModpack/pack.toml
        run: |
          set -euo pipefail

          expected="$(cat pack.toml)"

          # Wait until GitHub Pages serves the new pack.toml before restarting the server.
          for attempt in {1..120}; do
            current="$(curl -fsSL -H 'Cache-Control: no-cache' "$PAGES_URL" || true)"

            if [ "$current" = "$expected" ]; then
              echo "GitHub Pages is up to date."
              exit 0
            fi

            echo "Waiting for GitHub Pages to update ($attempt/120)..."
            sleep 5
          done

          echo "::error::GitHub Pages did not update within 10 minutes."
          exit 1

  notify-discord:
    runs-on: ubuntu-latest
    needs: wait-for-propagation
    steps:
      - name: Notify Discord
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        with:
          args: |
            <@&1516779713438285834> Das Modpack wurde aktualisiert.

            Der Server wird nun neugestartet. Denke daran dein Spiel neuzustarten, um die neuen Mods zu erhalten.

            Änderungen:
            ${{ github.event.head_commit.message }}

            (<${{ github.event.head_commit.url }}>)
